<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Sky Runner - ShopNex</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
<style>
/* TEMEL CSS (Önceki koddan alındı, optimize edildi) */
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e1a;--bg2:#111827;--glass:rgba(255,255,255,.06);--border:rgba(255,255,255,.08);--txt:#f1f5f9;--txt2:#94a3b8;--accent:#6366f1;--accent2:#818cf8;--green:#10b981;--amber:#f59e0b;--red:#ef4444;--header-h:64px}
[data-theme="light"]{--bg:#f8fafc;--bg2:#ffffff;--glass:rgba(0,0,0,.03);--border:rgba(0,0,0,.08);--txt:#0f172a;--txt2:#475569}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);overflow-x:hidden;line-height:1.5}
button{cursor:pointer;border:none;font-family:inherit}
.header{position:fixed;top:0;left:0;right:0;height:var(--header-h);background:var(--glass);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);z-index:100;display:flex;align-items:center;padding:0 20px;justify-content:space-between}
.logo{font-family:'Space Grotesk';font-size:22px;font-weight:700;color:var(--accent2)}
.main{margin-top:var(--header-h);padding:20px;max-width:1200px;margin-left:auto;margin-right:auto}
.page{display:none;animation:fadeIn .3s ease}.page.on{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1}}

/* OYUN ALANI */
.game-container{position:relative;width:100%;max-width:600px;margin:0 auto;border-radius:16px;overflow:hidden;border:2px solid var(--border);background:#000;box-shadow:0 0 40px rgba(99,102,241,.2)}
canvas{width:100%;display:block;touch-action:none}

/* UI ELEMENTLERİ */
.btn{padding:12px 24px;border-radius:12px;font-weight:700;font-size:14px;transition:.2s;display:inline-flex;align-items:center;gap:8px}
.btn-primary{background:linear-gradient(135deg,var(--accent),#4f46e5);color:#fff;box-shadow:0 4px 12px rgba(99,102,241,.3)}
.btn-glass{background:var(--glass);border:1px solid var(--border);color:var(--txt)}
.btn:hover{transform:translateY(-2px)}

/* HUD & MENÜLER */
.overlay{position:absolute;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(5px);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;z-index:10;padding:20px}
.overlay h1{font-family:'Space Grotesk';font-size:32px;margin-bottom:10px;background:linear-gradient(to right,#fff,var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stats-row{display:flex;gap:20px;margin:20px 0}
.stat-item b{display:block;font-size:20px;color:var(--amber)}.stat-item span{font-size:11px;color:var(--txt2)}

/* MAĞAZA KARTLARI */
.shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-top:20px}
.shop-card{background:var(--glass);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center;cursor:pointer;transition:.2s}
.shop-card.selected{border-color:var(--green);background:rgba(16,185,129,.1)}
.shop-card.locked{opacity:.5;filter:grayscale(1)}
.char-icon{font-size:32px;margin-bottom:8px;display:block}
.price-tag{font-size:12px;color:var(--amber);font-weight:700}

/* TOAST */
.toast{position:fixed;top:80px;right:20px;background:var(--bg2);border:1px solid var(--border);padding:12px 20px;border-radius:10px;z-index:999;transform:translateX(150%);transition:.3s}
.toast.show{transform:none}
</style>
</head>
<body>

<header class="header">
    <div class="logo">🚀 Sky Runner</div>
    <div style="display:flex;gap:10px;align-items:center">
        <span id="hudGold" style="font-size:13px;font-weight:700;color:var(--amber)">🪙 0</span>
        <span id="hudDiamond" style="font-size:13px;font-weight:700;color:#06b6d4">💎 0</span>
        <button class="btn btn-glass" onclick="toggleTheme()">🌓</button>
    </div>
</header>

<main class="main">
    
    <!-- ANA MENÜ -->
    <div class="page on" id="pg-menu">
        <div style="text-align:center;padding:40px 0">
            <h1 style="font-family:'Space Grotesk';font-size:48px;margin-bottom:10px">SKY RUNNER</h1>
            <p style="color:var(--txt2);margin-bottom:30px">Infinite Rush • v1.0</p>
            
            <div style="display:flex;justify-content:center;gap:15px;flex-wrap:wrap">
                <button class="btn btn-primary btn-lg" onclick="startGame()">▶ OYUNA BAŞLA</button>
                <button class="btn btn-glass" onclick="nav('shop')">🛒 MAĞAZA</button>
                <button class="btn btn-glass" onclick="nav('missions')">📋 GÖREVLER</button>
                <button class="btn btn-glass" onclick="nav('settings')">⚙️ AYARLAR</button>
            </div>

            <div class="stats-row" style="justify-content:center;margin-top:40px">
                <div class="stat-item"><b id="menuLevel">1</b><span>Seviye</span></div>
                <div class="stat-item"><b id="menuBest">0</b><span>En Yüksek</span></div>
                <div class="stat-item"><b id="menuRuns">0</b><span>Koşu</span></div>
            </div>
        </div>
    </div>

    <!-- OYUN EKRANI -->
    <div class="page" id="pg-game">
        <div class="game-container">
            <canvas id="gc" width="600" height="800"></canvas>
            
            <!-- Oyun İçi HUD -->
            <div id="gameHud" style="position:absolute;top:10px;left:10px;right:10px;display:flex;justify-content:space-between;pointer-events:none">
                <span style="font-weight:800;font-size:20px" id="scoreDisplay">0m</span>
                <div style="display:flex;gap:10px">
                    <span style="color:var(--amber)" id="gameGold">🪙 0</span>
                    <span style="color:#06b6d4" id="gameDia">💎 0</span>
                </div>
            </div>

            <!-- Başlangıç / Bitiş Ekranı -->
            <div class="overlay" id="gameOverlay">
                <h2 id="ovTitle">Hazır mısın?</h2>
                <p id="ovDesc" style="color:var(--txt2);margin-bottom:20px">Engellerden kaç, topla!</p>
                
                <div id="ovStats" class="stats-row" style="display:none">
                    <div class="stat-item"><b id="resScore">0</b><span>Puan</span></div>
                    <div class="stat-item"><b id="resGold">0</b><span>Altın</span></div>
                </div>

                <button class="btn btn-primary" onclick="startRun()">BAŞLA</button>
                <button class="btn btn-glass" style="margin-top:10px" onclick="nav('menu')">MENÜ</button>
            </div>
        </div>
        <div style="text-align:center;margin-top:10px;color:var(--txt3);font-size:12px">
            PC: Yön Tuşları / WASD • Mobil: Kaydır
        </div>
    </div>

    <!-- MAĞAZA -->
    <div class="page" id="pg-shop">
        <h2 style="margin-bottom:20px">🛒 Karakter Mağazası</h2>
        <div class="shop-grid" id="charGrid"></div>
        <button class="btn btn-glass" style="margin-top:20px" onclick="nav('menu')">← Geri Dön</button>
    </div>

    <!-- GÖREVLER -->
    <div class="page" id="pg-missions">
        <h2 style="margin-bottom:20px">📋 Günlük Görevler</h2>
        <div id="missionList"></div>
        <button class="btn btn-glass" style="margin-top:20px" onclick="nav('menu')">← Geri Dön</button>
    </div>

    <!-- AYARLAR -->
    <div class="page" id="pg-settings">
        <h2>Ayarlar</h2>
        <div style="margin-top:20px;display:flex;flex-direction:column;gap:10px">
            <button class="btn btn-glass" onclick="clearData()">🗑️ Verileri Sıfırla</button>
            <button class="btn btn-glass" onclick="nav('menu')">← Geri Dön</button>
        </div>
    </div>

</main>

<div class="toast" id="toast">Bildirim</div>

<script>
/* --- VERİ YÖNETİMİ --- */
const CHARS = [
    {id:'alex', name:'Alex', icon:'🏃', cost:0},
    {id:'luna', name:'Luna', icon:'👩‍🚀', cost:100},
    {id:'blaze', name:'Blaze', icon:'🔥', cost:250},
    {id:'shadow', name:'Shadow', icon:'🥷', cost:500},
    {id:'nova', name:'Nova', icon:'⭐', cost:1000},
    {id:'cyber', name:'Cyber', icon:'🤖', cost:2000}
];

let Data = {
    gold: 0, diamonds: 0, level: 1, xp: 0, bestScore: 0, totalRuns: 0,
    unlockedChars: ['alex'], currentChar: 'alex',
    missions: [
        {txt:'100m Koş', prog:0, target:100, reward:50, done:false},
        {txt:'10 Altın Topla', prog:0, target:10, reward:20, done:false},
        {txt:'5 Kez Zıpla', prog:0, target:5, reward:30, done:false}
    ]
};

function loadData(){
    const s = localStorage.getItem('skyRunnerData');
    if(s) Data = JSON.parse(s);
    updateHUD();
}
function saveData(){
    localStorage.setItem('skyRunnerData', JSON.stringify(Data));
    updateHUD();
}
function updateHUD(){
    document.getElementById('hudGold').textContent = '🪙 ' + Data.gold;
    document.getElementById('hudDiamond').textContent = '💎 ' + Data.diamonds;
    document.getElementById('menuLevel').textContent = Data.level;
    document.getElementById('menuBest').textContent = Math.floor(Data.bestScore);
    document.getElementById('menuRuns').textContent = Data.totalRuns;
}

/* --- NAVİGASYON --- */
function nav(pageId){
    document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
    document.getElementById('pg-'+pageId).classList.add('on');
    if(pageId === 'shop') renderShop();
    if(pageId === 'missions') renderMissions();
    if(pageId === 'menu') {
        document.getElementById('gameOverlay').style.display = 'flex';
        document.getElementById('ovTitle').textContent = 'Sky Runner';
        document.getElementById('ovDesc').textContent = 'Engellerden kaç, topla!';
        document.getElementById('ovStats').style.display = 'none';
        document.querySelector('#gameOverlay .btn-primary').textContent = 'BAŞLA';
    }
}

function showToast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), 2000);
}

function toggleTheme(){
    const h = document.documentElement;
    h.getAttribute('data-theme')==='dark' ? h.setAttribute('data-theme','light') : h.setAttribute('data-theme','dark');
}

/* --- OYUN MOTORU (GAME ENGINE) --- */
const cv = document.getElementById('gc');
const ctx = cv.getContext('2d');
let gameLoop, running = false, paused = false;
let frame = 0, score = 0, speed = 5;
let player = { lane: 1, y: 650, jumping: false, jumpH: 0, slide: false };
let obstacles = [], coins = [];
let runGold = 0, runDia = 0;

// Lane sistemi: 0 (Sol), 1 (Orta), 2 (Sağ)
const LANE_W = 200; // 600 / 3
const LANES = [100, 300, 500]; // X koordinatları

function startGame(){
    nav('game');
    // Reset overlay
    document.getElementById('gameOverlay').style.display = 'flex';
    document.getElementById('ovTitle').textContent = 'Hazır mısın?';
    document.getElementById('ovDesc').textContent = 'Engellerden kaç!';
    document.getElementById('ovStats').style.display = 'none';
    document.querySelector('#gameOverlay .btn-primary').style.display = 'inline-flex';
    document.querySelector('#gameOverlay .btn-primary').textContent = 'BAŞLA';
    
    // Önizleme çizimi
    ctx.fillStyle = '#0a0e1a'; ctx.fillRect(0,0,600,800);
    drawRoad();
    drawPlayerStatic();
}

function startRun(){
    document.getElementById('gameOverlay').style.display = 'none';
    resetGameVars();
    running = true;
    loop();
}

function resetGameVars(){
    frame = 0; score = 0; speed = 6;
    runGold = 0; runDia = 0;
    player = { lane: 1, y: 650, jumping: false, jumpH: 0, slide: false };
    obstacles = []; coins = [];
    document.getElementById('gameGold').textContent = '🪙 0';
    document.getElementById('gameDia').textContent = '💎 0';
}

function loop(){
    if(!running) return;
    update();
    draw();
    gameLoop = requestAnimationFrame(loop);
}

function update(){
    frame++;
    score += 0.1; // Mesafe bazlı puan
    speed += 0.001; // Zamanla hızlan

    // Engel oluşturma
    if(frame % Math.max(40, 100 - Math.floor(speed*2)) === 0){
        spawnObstacle();
    }
    // Altın oluşturma
    if(frame % 30 === 0 && Math.random() > 0.3){
        spawnCoin();
    }

    // Objeleri hareket ettir
    obstacles.forEach(o => o.y += speed);
    coins.forEach(c => c.y += speed);

    // Temizlik
    obstacles = obstacles.filter(o => o.y < 900);
    coins = coins.filter(c => c.y < 900);

    // Çarpışma Kontrolü
    checkCollisions();
    
    // UI Güncelle
    document.getElementById('scoreDisplay').textContent = Math.floor(score) + 'm';
}

function spawnObstacle(){
    const lane = Math.floor(Math.random()*3);
    const type = Math.random() > 0.7 ? 'fly' : 'ground'; // fly=düşük engel (eğil), ground=zıpla
    obstacles.push({ lane, y: -100, type });
}

function spawnCoin(){
    const lane = Math.floor(Math.random()*3);
    const type = Math.random() > 0.9 ? 'diamond' : 'gold';
    coins.push({ lane, y: -100, type });
}

function checkCollisions(){
    const pLane = player.lane;
    
    // Altınlar
    coins.forEach((c, i) => {
        if(c.lane === pLane && c.y > 600 && c.y < 700){
            if(c.type === 'gold'){ runGold++; Data.gold++; }
            else { runDia++; Data.diamonds++; }
            coins.splice(i, 1);
            updateHUD();
            document.getElementById('gameGold').textContent = '🪙 '+runGold;
            document.getElementById('gameDia').textContent = '💎 '+runDia;
            checkMissions('coin');
        }
    });

    // Engeller
    obstacles.forEach(o => {
        if(o.lane === pLane && o.y > 600 && o.y < 720){
            // Basit çarpışma: Eğer zıplamadıysa (veya uçan ise)
            let hit = true;
            if(o.type === 'ground' && player.jumping) hit = false; // Zıplayınca yerdeki engelden kurtul
            // Kayma mekaniği eklenebilir (fly tipi için)
            
            if(hit) gameOver();
        }
    });
}

function gameOver(){
    running = false;
    cancelAnimationFrame(gameLoop);
    
    Data.totalRuns++;
    if(score > Data.bestScore) Data.bestScore = score;
    
    // XP Hesabı
    Data.xp += Math.floor(score/10);
    if(Data.xp >= Data.level * 100){
        Data.level++;
        Data.xp = 0;
        showToast('🎉 Seviye Atladın! Lv.' + Data.level);
    }
    
    checkMissions('distance', Math.floor(score));
    saveData();

    // Overlay Göster
    const ov = document.getElementById('gameOverlay');
    ov.style.display = 'flex';
    document.getElementById('ovTitle').textContent = 'Oyun Bitti!';
    document.getElementById('ovStats').style.display = 'flex';
    document.getElementById('resScore').textContent = Math.floor(score) + 'm';
    document.getElementById('resGold').textContent = '+' + runGold;
    document.querySelector('#gameOverlay .btn-primary').style.display = 'none'; // Tekrar butonu gizle, menüye dön
}

/* --- ÇİZİM FONKSİYONLARI --- */
function draw(){
    // Arkaplan (Yol)
    ctx.fillStyle = '#0a0e1a'; 
    ctx.fillRect(0,0,600,800);
    
    drawRoad();
    
    // Gölge efekti (Derinlik)
    const grad = ctx.createLinearGradient(0,0,0,800);
    grad.addColorStop(0, 'rgba(10,14,26,1)');
    grad.addColorStop(1, 'rgba(10,14,26,0.8)');
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,600,800);

    // Objeler
    coins.forEach(c => {
        ctx.font = '30px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(c.type === 'gold' ? '🪙' : '💎', LANES[c.lane], c.y);
    });

    obstacles.forEach(o => {
        ctx.fillStyle = o.type === 'ground' ? '#ef4444' : '#f59e0b';
        // Basit kutu çizimi yerine emoji veya şekil
        ctx.font = '40px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(o.type === 'ground' ? '🚧' : '🚁', LANES[o.lane], o.y);
    });

    drawPlayerStatic();
}

function drawRoad(){
    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(200,0); ctx.lineTo(200,800);
    ctx.moveTo(400,0); ctx.lineTo(400,800);
    ctx.stroke();
    
    // Hız çizgileri
    ctx.fillStyle = 'rgba(99,102,241,0.2)';
    for(let i=0; i<10; i++){
        let y = (frame * speed + i * 100) % 800;
        ctx.fillRect(200-2, y, 4, 40);
        ctx.fillRect(400-2, y, 4, 40);
    }
}

function drawPlayerStatic(){
    const charObj = CHARS.find(c => c.id === Data.currentChar) || CHARS[0];
    const x = LANES[player.lane];
    let y = player.y - player.jumpH;
    
    // Gölge
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(x, player.y+20, 20, 10, 0, 0, Math.PI*2);
    ctx.fill();

    // Karakter
    ctx.font = '50px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(charObj.icon, x, y);
}

/* --- KONTROLLER --- */
function moveLeft(){ if(player.lane > 0) player.lane--; }
function moveRight(){ if(player.lane < 2) player.lane++; }
function jump(){ 
    if(!player.jumping){
        player.jumping = true;
        let h = 0, up = true;
        const jmp = setInterval(()=>{
            if(up){ h+=5; if(h>=80) up=false; }
            else { h-=5; if(h<=0){ h=0; player.jumping=false; clearInterval(jmp); } }
            player.jumpH = h;
        }, 16);
        checkMissions('jump');
    }
}

// Klavye
document.addEventListener('keydown', e => {
    if(!running) return;
    if(e.key === 'ArrowLeft' || e.key === 'a') moveLeft();
    if(e.key === 'ArrowRight' || e.key === 'd') moveRight();
    if(e.key === 'ArrowUp' || e.key === 'w' || e.key === ' ') jump();
});

// Dokunmatik (Swipe)
let touchStartX = 0, touchStartY = 0;
cv.addEventListener('touchstart', e => {
    touchStartX = e.changedTouches[0].screenX;
    touchStartY = e.changedTouches[0].screenY;
});
cv.addEventListener('touchend', e => {
    if(!running) return;
    const x = e.changedTouches[0].screenX;
    const y = e.changedTouches[0].screenY;
    const diffX = x - touchStartX;
    const diffY = y - touchStartY;
    
    if(Math.abs(diffX) > Math.abs(diffY)){
        if(diffX > 30) moveRight();
        else if(diffX < -30) moveLeft();
    } else {
        if(diffY < -30) jump();
    }
});

/* --- MAĞAZA & GÖREVLER --- */
function renderShop(){
    const grid = document.getElementById('charGrid');
    grid.innerHTML = '';
    CHARS.forEach(c => {
        const isUnlocked = Data.unlockedChars.includes(c.id);
        const isSelected = Data.currentChar === c.id;
        
        let btnClass = 'shop-card';
        if(isSelected) btnClass += ' selected';
        if(!isUnlocked) btnClass += ' locked';

        grid.innerHTML += `
        <div class="${btnClass}" onclick="buyOrSelect('${c.id}', ${c.cost})">
            <span class="char-icon">${c.icon}</span>
            <b>${c.name}</b>
            <div class="price-tag">${isUnlocked ? (isSelected?'SEÇİLİ':'SEÇ') : c.cost + ' 🪙'}</div>
        </div>`;
    });
}

function buyOrSelect(id, cost){
    if(Data.unlockedChars.includes(id)){
        Data.currentChar = id;
        saveData();
        renderShop();
        showToast('Karakter Seçildi: ' + id);
    } else {
        if(Data.gold >= cost){
            Data.gold -= cost;
            Data.unlockedChars.push(id);
            Data.currentChar = id;
            saveData();
            renderShop();
            showToast('Satın Alındı! ✅');
        } else {
            showToast('Yetersiz Altın! ❌');
        }
    }
}

function renderMissions(){
    const list = document.getElementById('missionList');
    list.innerHTML = '';
    Data.missions.forEach(m => {
        const percent = Math.min(100, (m.prog/m.target)*100);
        list.innerHTML += `
        <div style="background:var(--glass);padding:15px;border-radius:10px;margin-bottom:10px;border:1px solid var(--border)">
            <div style="display:flex;justify-content:space-between;margin-bottom:5px">
                <b>${m.txt}</b>
                <span style="color:var(--amber)">+${m.reward} 🪙</span>
            </div>
            <div style="height:6px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden">
                <div style="height:100%;width:${percent}%;background:var(--accent)"></div>
            </div>
            <div style="font-size:11px;color:var(--txt3);margin-top:4px;text-align:right">${m.prog} / ${m.target}</div>
        </div>`;
    });
}

function checkMissions(type, val){
    let updated = false;
    Data.missions.forEach(m => {
        if(m.done) return;
        if(type === 'coin' && m.txt.includes('Altın')) { m.prog++; updated=true; }
        if(type === 'distance' && m.txt.includes('Koş')) { m.prog = val; updated=true; }
        if(type === 'jump' && m.txt.includes('Zıpla')) { m.prog++; updated=true; }
        
        if(m.prog >= m.target){
            m.done = true;
            m.prog = m.target;
            Data.gold += m.reward;
            showToast('Görev Tamamlandı! +' + m.reward);
        }
    });
    if(updated) saveData();
}

function clearData(){
    if(confirm('Tüm ilerlemen silinecek! Emin misin?')){
        localStorage.removeItem('skyRunnerData');
        location.reload();
    }
}

/* BAŞLAT */
loadData();
</script>
</body>
</html>
